name: Lint Markdown

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Lint README.md
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: 'README.md'

